<!-- 
  Grouped Landing Page Template for D:\学习\ collection index.
  Replace section content with actual projects. 
  Update stats bar numbers. Adjust category colors as needed.
-->
<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>📚 学习文档中心</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: #0f1117;
    color: #e0e0e0;
    min-height: 100vh;
    padding: 40px 20px;
  }
  .container { max-width: 1080px; margin: 0 auto; }
  h1 {
    text-align: center;
    font-size: 2rem;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #60a5fa, #a78bfa);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle { text-align: center; color: #666; margin-bottom: 48px; font-size: 0.95rem; }
  .stats { text-align: center; margin-bottom: 40px; display: flex; justify-content: center; gap: 32px; flex-wrap: wrap; }
  .stat-num { font-size: 1.8rem; font-weight: 700; background: linear-gradient(135deg, #60a5fa, #a78bfa); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .stat-label { font-size: 0.75rem; color: #666; margin-top: 2px; }
  .section { margin-bottom: 48px; }
  .section-header { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid #2a2d3a; }
  .section-icon { font-size: 1.4rem; }
  .section-title { font-size: 1.25rem; font-weight: 600; color: #c0c0c0; }
  .section-count { font-size: 0.8rem; color: #555; background: #1a1d27; padding: 2px 10px; border-radius: 10px; border: 1px solid #2a2d3a; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
  .card {
    background: #1a1d27;
    border: 1px solid #2a2d3a;
    border-radius: 12px;
    padding: 22px;
    transition: all 0.25s ease;
    text-decoration: none;
    color: inherit;
    display: block;
  }
  .card:hover { transform: translateY(-3px); }
  .card-row { display: flex; align-items: flex-start; gap: 14px; }
  .card-icon { font-size: 1.8rem; flex-shrink: 0; margin-top: 2px; }
  .card-body { flex: 1; min-width: 0; }
  .card-title { font-size: 1.05rem; font-weight: 600; margin-bottom: 6px; color: #f0f0f0; }
  .card-desc { font-size: 0.82rem; color: #888; line-height: 1.6; }
  .card-meta { margin-top: 10px; font-size: 0.78rem; color: #555; display: flex; gap: 12px; flex-wrap: wrap; }
  .tag { display: inline-block; background: #252836; padding: 2px 8px; border-radius: 6px; font-size: 0.72rem; color: #7a7a8a; }
  
  /* Color-coded hover per section */
  .section-ai .card:hover { border-color: #60a5fa; box-shadow: 0 8px 30px rgba(96,165,250,0.15); }
  .section-tools .card:hover { border-color: #34d399; box-shadow: 0 8px 30px rgba(52,211,153,0.15); }
  .section-devops .card:hover { border-color: #f59e0b; box-shadow: 0 8px 30px rgba(245,158,11,0.15); }
  .section-life .card:hover { border-color: #f472b6; box-shadow: 0 8px 30px rgba(244,114,182,0.15); }
  
  .footer { text-align: center; margin-top: 40px; color: #444; font-size: 0.8rem; padding-top: 20px; border-top: 1px solid #1a1d27; }
</style>
</head>
<body>
<div class="container">
  <h1>📚 学习文档中心</h1>
  <p class="subtitle">局域网访问 · 局域网内任意设备可浏览</p>

  <!-- STATS: Replace with actual counts from: find <root> -name "*.html" | wc -l -->
  <div class="stats">
    <div class="stat"><div class="stat-num">N</div><div class="stat-label">文档项目</div></div>
    <div class="stat"><div class="stat-num">N+</div><div class="stat-label">HTML 页面</div></div>
    <div class="stat"><div class="stat-num">N</div><div class="stat-label">学科方向</div></div>
  </div>

  <!-- ═══ Category 1 ═══ -->
  <div class="section section-ai">
    <div class="section-header">
      <span class="section-icon">🧠</span>
      <span class="section-title">AI / LLM 技术</span>
      <span class="section-count">9 个项目</span>
    </div>
    <div class="grid">
      <a class="card" href="subdir/index.html">
        <div class="card-row">
          <div class="card-icon">📖</div>
          <div class="card-body">
            <div class="card-title">项目名称</div>
            <div class="card-desc">项目描述文字</div>
            <div class="card-meta">
              <span>📄 X 章</span>
              <span class="tag">标签</span>
            </div>
          </div>
        </div>
      </a>
      <!-- More cards... -->
    </div>
  </div>

  <!-- ═══ Category 2 ═══ -->
  <div class="section section-tools">
    <div class="section-header">
      <span class="section-icon">🛠️</span>
      <span class="section-title">开发工具</span>
      <span class="section-count">3 个项目</span>
    </div>
    <div class="grid">
      <!-- Cards... -->
    </div>
  </div>

  <div class="footer">学习文档中心 · 由 Python HTTP Server 提供服务</div>
</div>
</body>
</html>
